name: CI

on:
  push:
    branches: ["main", "feature/*", "fix/*", "chore/*"]
  pull_request:
    branches: ["main"]
  merge_group:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: sudo apt-get install -y shellcheck
      - run: bun install
      - run: scripts/ci/validate.sh
